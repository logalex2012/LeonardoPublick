<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПОРТАЛ1409: Найти кабинет</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            background-color: #000;
            background-image: url("static/apps-wallpaper.svg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            font-family: "Inter", sans-serif;
        }

        h1 {
            margin: 32px 24px 16px;
            color: #f9fafb;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.01em;
            text-align: center;
        }

        .logo {
            display: block;
            margin: 24px auto 8px;
            height: 32px;
        }

        .search-wrapper {
            margin-top: 32px;
            display: flex;
            justify-content: center;
        }

        .search-pill {
            min-width: 320px;
            max-width: 720px;
            width: calc(100% - 48px);
            padding: 14px 28px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.7);
            background: rgba(15, 23, 42, 0.45);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: text;
        }

        .search-icon {
            font-size: 18px;
            color: #f9fafb;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: #f9fafb;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
        }

        .search-input::placeholder {
            color: #e5e7eb;
        }

        @media (max-width: 480px) {
            h1 {
                margin: 24px 16px 12px;
                font-size: 16px;
            }

            .search-wrapper {
                margin-top: 24px;
            }

            .search-pill {
                width: calc(100% - 32px);
                min-width: 0;
                padding: 12px 20px;
            }

            .search-input {
                font-size: 16px;
            }
        }
    </style>

   <img class="logo" src="static/logo.svg" alt="Логотип школы № 1409">
    <div class="search-wrapper">
        <div class="search-pill">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input id="searchInput" class="search-input" type="text" placeholder="Введите своё имя для поиска в системе">
        </div>
    </div>

    <div id="result" style="margin:24px auto 0; max-width:720px; width:calc(100% - 48px); color:#f9fafb; font-size:14px; line-height:1.5; font-family:'Inter',sans-serif;">
    </div>

    <script>
        // ЗАМЕНИТЕ URL ниже на ссылку "Опубликовано в веб" в формате CSV из вашей Google‑таблицы
        // Пример: https://docs.google.com/spreadsheets/d/ID/export?format=csv
        const SHEET_CSV_URL = "/static/data.csv";

        let data = [];

        const input = document.getElementById("searchInput");
        const result = document.getElementById("result");

        function renderResult(person) {
            if (!person) {
                result.innerHTML = "<p>Ничего не найдено. Попробуйте уточнить имя.</p>";
                return;
            }

            result.innerHTML = `
                <div style="border-radius:16px;border:1px solid rgba(148,163,184,0.6);padding:16px 20px;background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);">
                    <div style="font-size:16px;font-weight:700;margin-bottom:4px;">${person.name}</div>
                    <div style="margin-bottom:6px;"><strong>Кабинет:</strong> ${person.cabinet}</div>
                    <div style="margin-bottom:6px;"><strong>Проект:</strong> ${person.project}</div>
                    <div><strong>Как добраться:</strong> ${person.route}</div>
                </div>
            `;
        }

        input.addEventListener("input", () => {
            const value = input.value.trim().toLowerCase();

            if (!value) {
                result.innerHTML = "";
                return;
            }

            const match = data.find((item) =>
                item.name.toLowerCase().includes(value)
            );

            renderResult(match);
        });

        // Загружаем данные из Google Sheets (CSV)
        fetch(SHEET_CSV_URL)
            .then((res) => res.text())
            .then((text) => {
                const lines = text.split(/\r?\n/).filter(Boolean);
                // считаем, что первая строка — заголовки: ФИО, Название, Школа, Класс, Руководитель, Тип
                const [header, ...rows] = lines;
                data = rows.map((row) => {
                    const cols = row.split(",");
                    // Индексы колонок: 0=ФИО, 1=Название, 2=Школа, 3=Класс, 4=Руководитель, 5=Тип
                    // Для поиска кабинета нам нужно имя (0), кабинет (пока нет в таблице, пусть будет пусто), проект (1), маршрут (пусто)
                    
                    // ВАЖНО: В вашей таблице пока нет колонок "Кабинет" и "Маршрут".
                    // Если вы их добавите, нужно будет поменять индексы.
                    // Пока мапим так:
                    const name = cols[0];
                    const project = cols[1];
                    const cabinet = ""; // Данных нет
                    const route = "";   // Данных нет

                    return {
                        name: (name || "").trim(),
                        cabinet: (cabinet || "").trim(),
                        project: (project || "").trim(),
                        route: (route || "").trim(),
                    };
                }).filter((item) => item.name);
            })
            .catch(() => {
                result.innerHTML = "<p>Не удалось загрузить данные из Google&nbsp;Таблицы.</p>";
            });
    </script>
    <!-- Global Overlay for Show Start -->
    <div id="showOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; backdrop-filter: blur(15px); transition: opacity 0.5s ease;">
        <img src="/static/logo.svg" style="height: 60px; margin-bottom: 30px;">
        <h1 style="font-size: 2rem; margin: 0 0 16px; color: #4446E1; text-transform: uppercase;">Внимание!</h1>
        <p style="font-size: 1.5rem; margin: 0 20px;">В Актовом зале началось<br>Шоу Леонардо!</p>
    </div>

    <script>
        // Logic to show overlay when show starts
        function checkShowStatus() {
            const lastStart = localStorage.getItem('iskra_show_start_command');
            const now = new Date().getTime();
            // Show for 40 seconds after start (approx audio length)
            const SHOW_DURATION = 40000; 

            if (lastStart && (now - parseInt(lastStart) < SHOW_DURATION)) {
                const overlay = document.getElementById('showOverlay');
                overlay.style.display = 'flex';
                
                const remainingTime = SHOW_DURATION - (now - parseInt(lastStart));
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, remainingTime);
            }
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'iskra_show_start_command') {
                checkShowStatus();
            }
        });
        
        // Check on load
        checkShowStatus();
    </script>
</body>
</html>
