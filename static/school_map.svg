<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" style="background: #1e293b; border-radius: 12px;">
    <defs>
        <style>
            .room { fill: #334155; stroke: #475569; stroke-width: 2; transition: all 0.3s; cursor: pointer; }
            .room:hover { fill: #4446E1; stroke: #6366f1; }
            .corridor { fill: #0f172a; stroke: none; }
            .text { fill: #94a3b8; font-family: sans-serif; font-size: 14px; font-weight: 600; pointer-events: none; }
            .room:hover + .text { fill: #ffffff; }
            .stairs { fill: #1e293b; stroke: #475569; stroke-width: 1; }
        </style>
    </defs>

    <!-- Main Corridor (Horizontal) -->
    <rect x="50" y="250" width="900" height="100" class="corridor" />
    
    <!-- Vertical Corridor (Left Wing) -->
    <rect x="50" y="50" width="100" height="200" class="corridor" />
    
    <!-- Vertical Corridor (Right Wing) -->
    <rect x="850" y="50" width="100" height="200" class="corridor" />

    <!-- Rooms Top Row (Left to Right) -->
    <!-- Wing Left -->
    <g>
        <rect x="150" y="50" width="100" height="80" class="room" id="room-401" />
        <text x="200" y="95" text-anchor="middle" class="text">401</text>
    </g>
    <g>
        <rect x="150" y="130" width="100" height="80" class="room" id="room-402" />
        <text x="200" y="175" text-anchor="middle" class="text">402</text>
    </g>

    <!-- Center Top -->
    <g>
        <rect x="300" y="150" width="100" height="100" class="room" id="room-403" />
        <text x="350" y="205" text-anchor="middle" class="text">403</text>
    </g>
    <g>
        <rect x="400" y="150" width="100" height="100" class="room" id="room-404" />
        <text x="450" y="205" text-anchor="middle" class="text">404</text>
    </g>
    <g>
        <rect x="500" y="150" width="100" height="100" class="room" id="room-405" />
        <text x="550" y="205" text-anchor="middle" class="text">405</text>
    </g>
    <g>
        <rect x="600" y="150" width="100" height="100" class="room" id="room-406" />
        <text x="650" y="205" text-anchor="middle" class="text">406</text>
    </g>

    <!-- Wing Right -->
    <g>
        <rect x="750" y="50" width="100" height="80" class="room" id="room-407" />
        <text x="800" y="95" text-anchor="middle" class="text">407</text>
    </g>
    <g>
        <rect x="750" y="130" width="100" height="80" class="room" id="room-408" />
        <text x="800" y="175" text-anchor="middle" class="text">408</text>
    </g>

    <!-- Rooms Bottom Row -->
    <g>
        <rect x="150" y="350" width="120" height="100" class="room" id="room-409" />
        <text x="210" y="405" text-anchor="middle" class="text">409</text>
    </g>
    <g>
        <rect x="270" y="350" width="120" height="100" class="room" id="room-410" />
        <text x="330" y="405" text-anchor="middle" class="text">410</text>
    </g>
    <g>
        <rect x="390" y="350" width="120" height="100" class="room" id="room-411" />
        <text x="450" y="405" text-anchor="middle" class="text">411</text>
    </g>
    
    <!-- Large Hall / Assembly -->
    <g>
        <rect x="550" y="350" width="300" height="150" class="room" id="room-hall" />
        <text x="700" y="430" text-anchor="middle" class="text">"+ </text>
    </g>

    <!-- Stairs -->
    <g>
        <rect x="50" y="250" width="50" height="100" class="stairs" />
        <line x1="50" y1="260" x2="100" y2="260" stroke="#475569" />
        <line x1="50" y1="270" x2="100" y2="270" stroke="#475569" />
        <line x1="50" y1="280" x2="100" y2="280" stroke="#475569" />
        <line x1="50" y1="290" x2="100" y2="290" stroke="#475569" />
        <line x1="50" y1="300" x2="100" y2="300" stroke="#475569" />
        <line x1="50" y1="310" x2="100" y2="310" stroke="#475569" />
        <line x1="50" y1="320" x2="100" y2="320" stroke="#475569" />
        <line x1="50" y1="330" x2="100" y2="330" stroke="#475569" />
        <line x1="50" y1="340" x2="100" y2="340" stroke="#475569" />
    </g>
    
    <g>
        <rect x="900" y="250" width="50" height="100" class="stairs" />
        <line x1="900" y1="260" x2="950" y2="260" stroke="#475569" />
        <line x1="900" y1="270" x2="950" y2="270" stroke="#475569" />
        <line x1="900" y1="280" x2="950" y2="280" stroke="#475569" />
        <line x1="900" y1="290" x2="950" y2="290" stroke="#475569" />
        <line x1="900" y1="300" x2="950" y2="300" stroke="#475569" />
        <line x1="900" y1="310" x2="950" y2="310" stroke="#475569" />
        <line x1="900" y1="320" x2="950" y2="320" stroke="#475569" />
        <line x1="900" y1="330" x2="950" y2="330" stroke="#475569" />
        <line x1="900" y1="340" x2="950" y2="340" stroke="#475569" />
    </g>

    <!-- You are here marker -->
    <circle cx="500" cy="300" r="8" fill="#ef4444" stroke="white" stroke-width="2">
        <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="500" y="325" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold" font-family="sans-serif">+ !,</text>

</svg>