<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПОРТАЛ1409: Статистика проектов</title>
    <link rel="icon" href="static/favicon.png">
</head>
<body>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: rgba(255, 255, 255, 0.08);
            --bg-tertiary: rgba(255, 255, 255, 0.06);
            --bg-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-color: rgba(255, 255, 255, 0.12);
            --border-light: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --cloud1-color1: rgba(68, 70, 225, 0.4);
            --cloud1-color2: rgba(220, 53, 69, 0.35);
            --cloud2-color1: rgba(100, 102, 255, 0.3);
            --cloud2-color2: rgba(255, 80, 100, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --accent: #4446E1;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            transition: background 0.3s ease, color 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse 80% 60% at 30% 20%, var(--cloud1-color1) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 70% 30%, var(--cloud1-color2) 0%, transparent 50%);
            z-index: -1;
            animation: cloudFloat 20s ease-in-out infinite, cloudFadeIn 2s ease-out forwards;
            transition: background 0.3s ease;
        }

        body::after {
            content: '';
            position: fixed;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background:
                radial-gradient(ellipse 50% 40% at 60% 25%, var(--cloud2-color1) 0%, transparent 45%),
                radial-gradient(ellipse 40% 35% at 40% 35%, var(--cloud2-color2) 0%, transparent 40%);
            z-index: -1;
            animation: cloudFloat2 25s ease-in-out infinite reverse, cloudFadeIn 3s ease-out forwards;
            transition: background 0.3s ease;
        }

        @keyframes cloudFadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes cloudFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(5%, 3%) scale(1.05);
            }

            50% {
                transform: translate(-3%, 5%) scale(0.98);
            }

            75% {
                transform: translate(-5%, -2%) scale(1.02);
            }
        }

        @keyframes cloudFloat2 {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(-4%, 4%) rotate(2deg);
            }

            66% {
                transform: translate(4%, -3%) rotate(-2deg);
            }
        }

        img.logo {
            margin-top: 24px;
            height: 28px;
        }

        h1 {
            color: #fff;
            margin-top: 16px;
            text-align: center;
            font-size: 38px;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 4px;
            color: rgba(249, 250, 251, 0.8);
            font-size: 14px;
            text-align: center;
        }

        .projects-wrapper {
            margin: 32px auto 32px;
            max-width: 100%;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: row;
            gap: 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .projects-wrapper::-webkit-scrollbar {
            height: 6px;
        }

        .projects-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }

        .projects-wrapper::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.7);
            border-radius: 999px;
        }

        .project-card {
            flex: 0 0 260px;
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.7);
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 14px 16px 16px;
            color: #f9fafb;
            box-sizing: border-box;
            scroll-snap-align: start;
        }

        .project-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .project-meta {
            font-size: 13px;
            line-height: 1.5;
            color: #e5e7eb;
        }

        .project-meta strong {
            font-weight: 600;
        }

        .empty-state {
            margin-top: 32px;
            color: #e5e7eb;
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 480px) {
            img.logo {
                height: 24px;
            }

            h1 {
                font-size: 22px;
            }

            .projects-wrapper {
                padding: 0 12px;
                gap: 12px;
            }
        }
    </style>

    <img class="logo" src="static/logo.svg" alt="Логотип 1409">

    <h1>Проекты конкурса «Леонардо»</h1>

    <div id="projectsWrapper" class="projects-wrapper">
        <!-- Карточки проектов будут подставлены через JS -->
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
        Пока нет проектов, отмеченных как участвующие в конкурсе «Леонардо».
    </div>

    <script>
        // Используем таблицу «Копия Леонардо-2024 (1)»
        // Лист с участниками конкурса, экспорт в CSV
        const SHEET_CSV_URL = "/static/data.csv";

        const projectsWrapper = document.getElementById("projectsWrapper");
        const emptyState = document.getElementById("emptyState");

        // Ожидаемый формат CSV для листа по ссылке:
        // A: ФИ участника
        // B: Название работы
        // C: Образовательное учреждение
        // D: Класс
        // E: ФИО руководителя

        const FALLBACK_PROJECTS = [
            {
                fio: "Иванов Иван",
                title: "Пример проекта конкурса",
                school: "ГБОУ Школа № 1409",
                grade: "9",
                teacher: "Петров П.П.",
            },
            {
                fio: "Петрова Мария",
                title: "Ещё один пример проекта",
                school: "ГБОУ Школа № 1409",
                grade: "8",
                teacher: "Иванова И.И.",
            },
        ];

        function renderProjects(projects) {
            if (!projects.length) {
                emptyState.style.display = "block";
                emptyState.textContent = "Нет работ для отображения.";
                return;
            }

            emptyState.style.display = "none";

            projectsWrapper.innerHTML = projects
                .map(
                    (p) => `
                        <div class="project-card">
                            <div class="project-title">${p.title}</div>
                            <div class="project-meta">
                                <div><strong>Участник:</strong> ${p.fio}</div>
                                ${
                                    p.school
                                        ? `<div><strong>Школа:</strong> ${p.school}</div>`
                                        : ""
                                }
                                ${
                                    p.grade
                                        ? `<div><strong>Класс:</strong> ${p.grade}</div>`
                                        : ""
                                }
                                ${
                                    p.teacher
                                        ? `<div><strong>Руководитель:</strong> ${p.teacher}</div>`
                                        : ""
                                }
                                ${
                                    p.type
                                        ? `<div style="margin-top:4px;"><span style="background:rgba(68,70,225,0.2);color:#a5a6ff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">${p.type}</span></div>`
                                        : ""
                                }
                                ${
                                    p.cabinet
                                        ? `<div style="margin-top:4px;"><span style="background:rgba(16,185,129,0.2);color:#10b981;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">Кабинет ${p.cabinet}</span></div>`
                                        : ""
                                }
                            </div>
                        </div>
                    `
                )
                .join("");
        }

        fetch(SHEET_CSV_URL)
            .then((res) => {
                if (!res.ok) {
                    throw new Error("Bad status");
                }
                return res.text();
            })
            .then((text) => {
                const lines = text.split(/\r?\n/).filter(Boolean);
                if (lines.length <= 1) {
                    renderProjects(FALLBACK_PROJECTS);
                    return;
                }

                const [header, ...rows] = lines;

                const projects = rows
                    .map((row) => {
                        const cols = [];
                        let inQuotes = false;
                        let currentValue = '';
                        for (let i = 0; i < row.length; i++) {
                            const char = row[i];
                            if (char === '"') {
                                inQuotes = !inQuotes;
                            } else if (char === ',' && !inQuotes) {
                                cols.push(currentValue);
                                currentValue = '';
                            } else {
                                currentValue += char;
                            }
                        }
                        cols.push(currentValue);

                        const [fio, title, school, grade, teacher, type, cabinet] = cols;
                        return {
                            fio: (fio || "").trim(),
                            title: (title || "").trim(),
                            school: (school || "").trim(),
                            grade: (grade || "").trim(),
                            teacher: (teacher || "").trim(),
                            type: (type || "").trim(),
                            cabinet: (cabinet || "").trim(),
                        };
                    })
                    .filter((item) => item.fio && item.title);

                if (!projects.length) {
                    renderProjects(FALLBACK_PROJECTS);
                    return;
                }

                renderProjects(projects);
            })
            .catch(() => {
                // Если не удалось получить данные с Google‑таблицы — показываем зашитый список
                renderProjects(FALLBACK_PROJECTS);
            });
    </script>
    <!-- Global Overlay for Show Start -->
    <div id="showOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; backdrop-filter: blur(15px); transition: opacity 0.5s ease;">
        <img src="/static/logo.svg" style="height: 60px; margin-bottom: 30px;">
        <h1 style="font-size: 2rem; margin: 0 0 16px; color: #4446E1; text-transform: uppercase;">Внимание!</h1>
        <p style="font-size: 1.5rem; margin: 0 20px;">В Актовом зале началось<br>Шоу Леонардо!</p>
    </div>

    <script>
        // Logic to show overlay when show starts
        function checkShowStatus() {
            const lastStart = localStorage.getItem('iskra_show_start_command');
            const now = new Date().getTime();
            // Show for 40 seconds after start (approx audio length)
            const SHOW_DURATION = 40000; 

            if (lastStart && (now - parseInt(lastStart) < SHOW_DURATION)) {
                const overlay = document.getElementById('showOverlay');
                overlay.style.display = 'flex';
                
                const remainingTime = SHOW_DURATION - (now - parseInt(lastStart));
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, remainingTime);
            }
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'iskra_show_start_command') {
                checkShowStatus();
            }
        });
        
        // Check on load
        checkShowStatus();
    </script>
</body>
</html>
